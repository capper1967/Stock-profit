<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="StockTarget"/>
  <meta name="theme-color" content="#080c14"/>
  <meta name="description" content="Calculate price targets for 100%, 300% and 500% profit on any stock position"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>StockTarget — Profit Calculator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    /* ── Reset ──────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080c14;
      --bg2:         #0d1420;
      --bg3:         #111a28;
      --bg4:         #162030;
      --green:       #22c55e;
      --green-dim:   #166534;
      --green-glow:  rgba(34,197,94,0.15);
      --amber:       #f59e0b;
      --amber-dim:   #78350f;
      --red:         #ef4444;
      --red-dim:     #7f1d1d;
      --text:        #e2e8f0;
      --text-muted:  #64748b;
      --text-dim:    #334155;
      --border:      rgba(34,197,94,0.12);
      --border-bright: rgba(34,197,94,0.3);
      --radius:      12px;
      --mono:        'Share Tech Mono', monospace;
      --sans:        'Syne', sans-serif;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(32px + var(--safe-bottom));
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }

    /* ── Scanline grid overlay ──────────────────────────────────────────── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34,197,94,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,94,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .grid-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(34,197,94,0.06) 0%, transparent 70%);
    }

    #app { position: relative; z-index: 1; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(var(--safe-top) + 16px) 18px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-wrap { display: flex; align-items: center; gap: 12px; }
    .logo-icon svg { width: 36px; height: 36px; }

    .logo-title {
      display: block;
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1.1;
    }

    .logo-accent { color: var(--green); }

    .logo-sub {
      display: block;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .clear-btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      text-transform: uppercase;
    }

    .clear-btn:active { color: var(--green); border-color: var(--green); }

    /* ── Main ───────────────────────────────────────────────────────────── */
    .main {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Input panel ────────────────────────────────────────────────────── */
    .input-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field-wrap { display: flex; flex-direction: column; gap: 6px; }
    .field-wrap.full-width { grid-column: 1 / -1; }

    .field-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .optional {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: none;
      letter-spacing: 0;
    }

    .input-adorn { position: relative; }

    .adorn-pre {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 14px;
      color: var(--green);
      pointer-events: none;
      z-index: 1;
    }

    .field-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 16px;
      padding: 12px 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    .field-input.has-pre { padding-left: 26px; }

    .field-input.ticker-input {
      text-transform: uppercase;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--green);
    }

    .field-input::placeholder {
      color: var(--text-dim);
      font-size: 13px;
    }

    .field-input:focus {
      border-color: var(--border-bright);
      box-shadow: 0 0 0 3px var(--green-glow);
    }

    .field-input[type=number]::-webkit-outer-spin-button,
    .field-input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .field-input[type=number] { -moz-appearance: textfield; }

    .field-hint {
      font-size: 10px;
      color: var(--text-dim);
      line-height: 1.3;
    }

    /* ── Summary bar ────────────────────────────────────────────────────── */
    .summary-bar {
      display: flex;
      align-items: center;
      background: var(--bg2);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      padding: 14px 16px;
      gap: 0;
      position: relative;
      overflow: hidden;
    }

    .summary-bar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--green), transparent);
    }

    .summary-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }

    .summary-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .summary-val {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--green);
    }

    .summary-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
      flex-shrink: 0;
    }

    .ticker-badge {
      position: absolute;
      top: 8px;
      right: 12px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--green);
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 4px;
      padding: 2px 8px;
      text-transform: uppercase;
    }

    /* ── Current position ───────────────────────────────────────────────── */
    .current-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      animation: fadeIn 0.3s ease;
    }

    .current-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .current-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .cur-arrow { font-size: 14px; font-weight: bold; }
    .cur-arrow.up   { color: var(--green); }
    .cur-arrow.down { color: var(--red); }

    .current-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cur-block { display: flex; flex-direction: column; gap: 3px; }

    .cur-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .cur-val {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--text);
      font-weight: 600;
    }

    .cur-pl, .cur-pct {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
    }

    .cur-pl.up, .cur-pct.up   { color: var(--green); }
    .cur-pl.down, .cur-pct.down { color: var(--red); }

    /* ── Targets heading ────────────────────────────────────────────────── */
    .targets-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0;
    }

    .targets-heading-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright));
    }

    .targets-heading-line:last-child {
      background: linear-gradient(90deg, var(--border-bright), transparent);
    }

    .targets-heading-text {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2.5px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── Target cards ───────────────────────────────────────────────────── */
    .targets-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .target-card {
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 18px;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.4s ease both;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
      transition: transform 0.15s;
    }

    .target-card:nth-child(1) { animation-delay: 0.05s; }
    .target-card:nth-child(2) { animation-delay: 0.12s; }
    .target-card:nth-child(3) { animation-delay: 0.19s; }

    /* Accent left stripe */
    .target-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }

    /* Glow */
    .target-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 0% 50%, var(--glow), transparent 70%);
      opacity: var(--glow-opacity);
      pointer-events: none;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .target-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .target-badge {
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 8px 14px;
      align-items: center;
      min-width: 70px;
    }

    .target-pct {
      font-family: var(--sans);
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .target-profit-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .target-mult-wrap {
      text-align: right;
    }

    .target-mult {
      display: block;
      font-family: var(--sans);
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      opacity: 0.9;
    }

    .target-sublabel {
      display: block;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Target price */
    .target-price-display {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 14px;
    }

    .target-price-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .target-price {
      font-family: var(--mono);
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-shadow: 0 0 20px var(--glow);
    }

    /* Divider */
    .target-divider {
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 14px 0;
    }

    /* Stats */
    .target-stats { display: flex; flex-direction: column; gap: 8px; }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .stat-val.up { color: var(--green); }

    /* Sell section */
    .sell-heading {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .sell-strategy {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .sell-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .sell-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
      min-width: 0;
    }

    .sell-strategy-label {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .sell-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .sell-sub strong { color: var(--accent); }
    .sell-full-val, .sell-cost-val { color: var(--text-dim); }

    .sell-remain-line {
      display: block;
      margin-top: 2px;
    }

    .sell-remain {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--green);
      background: rgba(34,197,94,0.08);
      border-radius: 4px;
      padding: 2px 6px;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .prog-track {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), rgba(255,255,255,0.4));
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
    }

    .prog-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }

    /* ── Hidden / Empty ─────────────────────────────────────────────────── */
    .hidden { display: none !important; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 48px 24px;
      text-align: center;
    }

    .empty-icon { opacity: 0.6; }

    .empty-title {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .empty-sub {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    /* ── Break-even sell (current position card) ────────────────────────── */
    .breakeven-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .breakeven-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .breakeven-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(34,197,94,0.06);
      border: 1px solid rgba(34,197,94,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      gap: 8px;
    }

    .breakeven-icon { font-size: 18px; flex-shrink: 0; }

    .breakeven-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .breakeven-title {
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .breakeven-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
    }

    .breakeven-qty {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      text-align: right;
      flex-shrink: 0;
    }

    .breakeven-qty-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      text-align: right;
      display: block;
    }

    .breakeven-impossible {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--red);
      padding: 8px 12px;
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.15);
      border-radius: 8px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* ── Disclaimer ─────────────────────────────────────────────────────── */
    .disclaimer {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      line-height: 1.6;
      text-align: center;
      padding: 12px 8px;
      border-top: 1px solid var(--border);
      letter-spacing: 0.2px;
    }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    .app-footer {
      text-align: center;
      padding: 16px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Tap highlight ───────────────────────────────────────────────────── */
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
